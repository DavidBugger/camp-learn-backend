services:
  - type: web
    name: camplearn-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.6
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: camplearn-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"

databases:
  - name: camplearn-db
    plan: free
